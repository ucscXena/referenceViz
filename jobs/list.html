{% extends "base.html" %}
{% block content %}
<h2>Your Jobs</h2>
<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th><th>File</th><th>Status</th><th>Created</th>
        </tr>
    </thead>
    <tbody>
    {% for job in jobs %}
        <tr>
            <td>{{ job.id }}</td>
            <td>{{ job.uploaded_file.name }}</td>
            <td>{{ job.get_status_display }}</td>
            <td>{{ job.created_at|date:"Y-m-d H:i" }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="4">No jobs yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
<p><a href="{% url 'job_create' %}">Upload a new file</a></p>
{% endblock %}
