{% extends "admin/base_site.html" %}
{% block content %}
<style>
  .prompt-toolbar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .prompt-toolbar form { margin: 0; }
  .prompt-meta { color: #666; font-size: 0.875rem; }
  pre.system-prompt {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: monospace;
    font-size: 0.8125rem;
    line-height: 1.5;
    background: #1e1e1e;
    color: #d4d4d4;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 16px;
    margin: 0;
  }
  {% if recomputed %}
  .recompute-notice { color: #2e7d32; font-weight: 500; }
  {% endif %}
</style>

<div class="prompt-toolbar">
  <form method="post">
    {% csrf_token %}
    <input type="submit" value="Re-compute summaries &amp; refresh" class="button">
  </form>
  {% if recomputed %}
  <span class="recompute-notice prompt-meta">
    Recomputed {{ recomputed }} projection{{ recomputed|pluralize }} — summary updated.
  </span>
  {% endif %}
</div>

<pre class="system-prompt">{{ prompt }}</pre>
{% endblock %}
