{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}UCSC Brain Explorer{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="{% static 'favicons/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="base-root">
    <header class="base-header">
      <a href="/jobs/" class="header-logo-link">
        <img src="{% static 'img/ucsc-be-logo.webp' %}" alt="UCSC Brain Explorer" class="header-logo">
      </a>
      <nav class="header-nav">
        <a href="/references/" class="header-nav-link">References</a>
        <a href="/jobs/" class="header-nav-link header-nav-link--active">My Dashboard</a>
      </nav>
      {% if user.email %}
      <div class="header-user">
        <span class="header-email">{{ user.email }}</span>
        <a class="btn-logout" href="{% url 'account_logout' %}">Logout</a>
      </div>
      {% endif %}
    </header>

    <div class="base-content">
    {% block base_content %}{% endblock %}
    </div>
    {% block extra_body %}{% endblock %}
  </body>
</html>
